name: Build and Deploy to Pi

on:
    push:
        branches: [ "master" ]

jobs:
    build-and-push:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Set up QEMU
              uses: docker/setup-qemu-action@v3

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Login to Docker Hub
              uses: docker/login-action@v3
              with:
                username: ${{ secrets.DOCKERHUB_USERNAME }}
                password: ${{ secrets.DOCKERHUB_TOKEN }}

            - name: Build and push Server
              uses: docker/build-push-action@v5
              with:
                context: ./server
                push: true
                tags: ${{ secrets.DOCKERHUB_USERNAME }}/marketmaven-server:latest
                platforms: linux/arm64

            - name: Build and push Client
              uses: docker/build-push-action@v5
              with:
                context: ./client
                push: true
                tags: ${{ secrets.DOCKERHUB_USERNAME }}/marketmaven-client:latest
                platforms: linux/arm64

    deploy:
        runs-on: ubuntu-latest
        needs: build-and-push
        environment: LocalPiServer
        steps:
            - name: Install cloudflared
              run: |
               wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb -O cloudflared.deb
               sudo dpkg -i cloudflared.deb
               rm cloudflared.deb

            - name: SSH and Deploy
              uses: appleboy/ssh-action@v1.0.3
              with:
                host: ${{ secrets.PI_SSH_HOST }}
                username: ${{ secrets.PI_SSH_USER }}
                key: ${{ secrets.PI_SSH_KEY }}
                proxy_command: |
                 cloudflared access ssh --hostname %h --service-token-id ${{ secrets.CF_CLIENT_ID }} --service-token-secret ${{ secrets.CF_CLIENT_SECRET }}
                script: |
                    cd /mnt/data/Projects/MarketMavenSocialTrends
                    docker compose pull
                    docker compose up -d
