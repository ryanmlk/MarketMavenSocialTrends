name: Build and Deploy to Pi

on:
    push:
        branches: [ "master" ]

jobs:
    deploy:
        runs-on: ubuntu-latest
        environment: LocalPiServer
        steps:
            - name: Install cloudflared
              run: |
               wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb -O cloudflared.deb
               sudo dpkg -i cloudflared.deb
               rm cloudflared.deb

            - name: SSH and Deploy
              uses: appleboy/ssh-action@v1.0.3
              with:
                host: ${{ secrets.PI_SSH_HOST }}
                username: ${{ secrets.PI_SSH_USER }}
                key: ${{ secrets.PI_SSH_KEY }}
                proxy_command: |
                 cloudflared access ssh --hostname %h --service-token-id ${{ secrets.CF_CLIENT_ID }} --service-token-secret ${{ secrets.CF_CLIENT_SECRET }}
                script: |
                    cd /mnt/data/Projects/MarketMavenSocialTrends
                    docker compose pull
                    docker compose up -d
